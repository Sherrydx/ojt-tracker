<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OJT Tracker for Cloud</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class'
    }
    </script>
</head>
<body>
    <div id="root" class="min-h-screen transition-colors duration-300 bg-gray-100 dark:bg-gray-900">
        <!-- Navigation Bar -->
        <nav class="flex justify-between items-center px-8 py-4 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
            <div class="text-2xl font-bold text-gray-900 dark:text-white">OJT Tracker</div>
            <button id="themeToggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                <span class="text-xl">🌙</span>
            </button>
        </nav>

        <!-- Main Container -->
        <div class="flex items-center justify-center min-h-[calc(100vh-80px)]">
            <div class="w-full max-w-md mx-4">

                <!-- Card -->
                <div class="bg-white dark:bg-gray-800 rounded-3xl p-8 shadow-lg">
                    <!-- Welcome Text -->
                        <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-3 text-center">Welcome!</h1>
                        <p class="text-gray-600 dark:text-gray-400 mb-8 text-center">
                            <a href="#" class="underline text-gray-900 dark:text-white font-medium">Create a free account</a>
                            <span class="text-gray-500 dark:text-gray-500">or log in to get started.</span>
                        </p>

                    <!-- Form -->
                    <form id="loginForm" class="space-y-6">
                        <!-- Email Input -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email"
                                placeholder="your@email.com"
                                required
                                class="w-full px-4 py-3 rounded-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 transition-colors"
                            >
                            <span id="emailError" class="text-red-500 text-sm mt-1 hidden"></span>
                        </div>

                        <!-- Password Input -->
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                            <div class="relative">
                                <input 
                                    type="password" 
                                    id="password" 
                                    name="password"
                                    placeholder="•••••••"
                                    required
                                    class="w-full px-4 py-3 rounded-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 transition-colors"
                                >
                                <button 
                                    type="button" 
                                    id="passwordToggle" 
                                    class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200"
                                >
                                    👁️
                                </button>
                            </div>
                            <span id="passwordError" class="text-red-500 text-sm mt-1 hidden"></span>
                        </div>

                        <!-- Forgot Password Link -->
                        <div class="text-right">
                            <a href="#" class="text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">Forgot password?</a>
                        </div>

                        <!-- Login Button -->
                        <button 
                            type="submit" 
                            class="w-full py-3 rounded-full bg-black dark:bg-white text-white dark:text-black font-semibold hover:bg-gray-800 dark:hover:bg-gray-100 transition-colors"
                        >
                            Log in
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="flex items-center my-6">
                        <div class="flex-1 border-t border-gray-300 dark:border-gray-600"></div>
                        <span class="px-3 text-sm text-gray-500 dark:text-gray-400">or</span>
                        <div class="flex-1 border-t border-gray-300 dark:border-gray-600"></div>
                    </div>

                    <!-- OAuth Buttons -->
                        <div class="space-y-3">
                            <!-- Google Login -->
                            <button class="w-full py-3 rounded-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white font-semibold hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">
                                Log in with Google
                            </button>

                            <!-- Microsoft Login -->
                            <button class="w-full py-3 rounded-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white font-semibold hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">
                                Log in with Microsoft
                            </button>
                        </div>
                </div>
            </div>
        </div>
    </div>
 <script src="js/login.js"></script>
 </script>
</body>
</html>
